weather_sensitivity:
  heat:
    level: high
    description: 고온 지속 시 생육 저하 및 품질 저하 가능
  cold:
    level: medium
    description: 한파 및 냉해 시 품질 저하 가능
  heavy_rain:
    level: high
    description: 집중호우 시 병해, 수확 지연, 물류 차질 가능
  drought:
    level: medium
    description: 가뭄 시 생육 저하 가능
  typhoon:
    level: high
    description: 태풍 시 산지 피해와 물류 차질 가능
  sunlight:
    level: medium
    description: 일조 부족 시 생육 지연 가능

demand_events:
  - event_name: 김장철
    months: [10, 11, 12]
    effect: demand_up
    importance: high
  - event_name: 추석
    effect: demand_up
    importance: medium
  - event_name: 설
    effect: demand_up
    importance: medium
  - event_name: 급식 재개
    months: [3, 9]
    effect: demand_up
    importance: low
  - event_name: 장마철
    months: [6, 7]
    effect: supply_down
    importance: medium

