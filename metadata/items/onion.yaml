item_code: onion
item_name: 양파
category: 인경채류

units:
  wholesale: 20kg
  retail: 망(1kg)

storage:
  type: long
  typical_days: 180
  description: 저장성이 높아 저장 물량이 가격에 큰 영향. 수입 대체재 존재

price_character:
  volatility: high
  seasonality: high
  import_dependency: medium

main_markets:
  - name: 가락시장
    priority: 1
  - name: 대구도매시장
    priority: 2
  - name: 광주도매시장
    priority: 3

substitute_items:
