    item_name: 마늘
    relationship: partial_substitute
    confidence: low
  - item_code: green_onion
    item_name: 대파
    relationship: partial_substitute
    confidence: low

weather_sensitivity:
  heat:
    level: medium
    description: 고온 시 조기 수확 유도, 저장성 저하
  cold:
    level: high
    description: 냉해 시 구 비대 불량, 고사 가능
  heavy_rain:
    level: high
    description: 수확기 장마 시 부패·저장성 급락
  drought:
    level: low
    description: 상대적으로 가뭄에 강한 편
  typhoon:
    level: medium
    description: 태풍 직격 시 도복·병해 발생

growth_calendar:
